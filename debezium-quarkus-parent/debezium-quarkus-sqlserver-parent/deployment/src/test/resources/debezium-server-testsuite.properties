debezium.source.offset.storage=org.apache.kafka.connect.storage.MemoryOffsetBackingStore
debezium.source.schema.history.internal=io.debezium.relational.history.MemorySchemaHistory
debezium.source.name=test
debezium.source.topic.prefix=topic
debezium.source.topic.naming.strategy=io.debezium.schema.DefaultTopicNamingStrategy
debezium.source.database.names=inventory
debezium.source.database.encrypt=false
debezium.source.database.trustServerCertificate=false
debezium.source.snapshot.mode=initial
debezium.source.capturing.orders.destination=topic.inventory.orders
debezium.source.include.schema.changes=false
debezium.source.heartbeat.interval.ms=5

debezium.source.datasource.db-kind=mssql
debezium.source.datasource.username=${SQLSERVER_USERNAME}
debezium.source.datasource.password=${SQLSERVER_PASSWORD}

debezium.source.datasource.jdbc.url=${SQLSERVER_JDBC}
debezium.source.datasource.jdbc.max-size=16

quarkus.devservices.enabled=false